<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geração de Valor - Oficial</title>
    <style>
        :root {
            --roxo: #9b51e0;
            --azul: #8ec5fc;
            --gradiente: linear-gradient(135deg, #8ec5fc 0%, #e0c3fc 100%);
        }
        
        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            background: var(--gradiente);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .card-premium {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            width: 350px; max-height: 90vh;
            padding: 25px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid white;
            text-align: center; position: relative;
            display: flex; flex-direction: column;
        }

        .btn-config {
            position: absolute; top: 20px; right: 20px;
            font-size: 26px; cursor: pointer; color: var(--roxo);
            z-index: 999; background: none; border: none;
        }

        /* Faixa de Aviso (Deslize) */
        #avisoDeslize {
            display: none; background: #fff3cd; color: #856404;
            padding: 10px; border-radius: 15px; margin-bottom: 10px;
            font-size: 13px; border: 1px solid #ffeeba;
        }

        .barra-fundo {
            background: rgba(0, 0, 0, 0.05);
            height: 30px; border-radius: 20px; margin: 20px 0;
            position: relative; overflow: visible; border: 1px solid rgba(255,255,255,0.5);
        }

        .barra-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--azul), var(--roxo));
            transition: width 0.8s ease-in-out; border-radius: 20px;
        }

        /* Avatar na Barra */
        #avatarProgresso {
            position: absolute; right: -15px; top: -10px;
            font-size: 25px; transition: all 0.8s ease-in-out;
        }

        .area-tarefas { overflow-y: auto; flex-grow: 1; padding: 5px; }
        .area-tarefas::-webkit-scrollbar { width: 0; }

        .tarefa-item {
            display: flex; justify-content: space-between; align-items: center;
            background: white; margin-bottom: 10px; padding: 12px 15px;
            border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tarefa-info { text-align: left; }
        .tarefa-titulo { font-weight: bold; display: block; color: #333; font-size: 14px; }
        .tarefa-sub { font-size: 11px; color: #888; }

        /* Modais */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            z-index: 10000; 
            justify-content: center;
            align-items: flex-start; /* Alinha a caixa no topo */
            overflow-y: auto; /* Permite rolar o modal se o conteúdo for muito grande */
        }

        .modal-caixa {
            background: white; padding: 25px; border-radius: 30px;
            width: 85%; max-width: 350px; text-align: center;
            margin: 40px 0; /* Adiciona espaço vertical para não colar nas bordas */
        }

        input { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; 
            box-sizing: border-box; /* Corrige o problema de alinhamento dos inputs */
        }

        .feedback-flutuante {
            position: fixed; font-size: 50px; pointer-events: none;
            animation: subirESumir 1s ease-out forwards; z-index: 10001;
        }
        @keyframes subirESumir {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -150px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-premium">
        <button class="btn-config" id="abrirModal">⚙️</button>
        
        <div id="avisoDeslize">
            <span id="msgAviso"></span><br>
            <button onclick="confirmarMelhora()" style="background:#856404; color:white; border:none; padding:5px 10px; border-radius:10px; margin-top:5px; cursor:pointer;">Vou melhorar</button>
        </div>

        <div class="topo-fixo">
            <h1 id="nomeDisplay">Filha</h1>
            <p style="margin:0">Meta: <strong id="premioDisplay">🎁 iPhone</strong></p>
            <div class="barra-fundo">
                <div class="barra-fill" id="progressoBarra">
                    <div id="avatarProgresso">🥚</div>
                </div>
            </div>
            <div style="font-weight: bold; font-size: 14px;">
                <span id="pontosDisplay">0</span> / <span id="metaDisplay">5000</span> Pontos
            </div>
        </div>

        <div class="area-tarefas" id="listaApp"></div>
    </div>

    <div class="modal" id="painelConfig">
        <div class="modal-caixa">
            <h3 style="color: var(--roxo)">Configurações</h3>
            <input type="text" id="editNome" placeholder="Nome">
            <input type="text" id="editPremio" placeholder="Prêmio">
            <input type="number" id="editMeta" placeholder="Meta de Pontos">
            <div id="listaEdit" style="margin-bottom: 10px;"></div>
            <button onclick="novaTarefa()" style="color: var(--roxo); border:none; background:none; cursor:pointer;">+ Add Tarefa</button>
            <button class="btn-salvar" id="btnSalvar" style="background:#27ae60; color:white; border:none; padding:15px; width:100%; border-radius:15px; cursor:pointer;">Salvar</button>
            <button onclick="resetarTudo()" style="background:#e74c3c; color:white; border:none; padding:10px; width:100%; border-radius:15px; margin-top:10px; cursor:pointer;">Resetar Tudo</button>
            <button id="btnFechar" style="background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalVitoria">
        <div class="modal-caixa">
            <h1 style="font-size: 50px;">🎆</h1>
            <h2 style="color: var(--roxo)">PARABÉNS!</h2>
            <p>Você acabou de dar um passo a mais para sua maior conquista!</p>
            <button onclick="document.getElementById('modalVitoria').style.display='none'" style="background:var(--azul); border:none; padding:15px; width:100%; border-radius:15px; cursor:pointer;">Continuar!</button>
        </div>
    </div>

<script>
    let dados = JSON.parse(localStorage.getItem('jornada_v3')) || {
        nome: "Filha", premio: "📱 iPhone 16", meta: 5000, pontos: 0,
        tarefas: [
            { t: "📚 Estudo", s: "Dever de casa", v: 50 },
            { t: "🛌 Arrumar cama", s: "Organização", v: 20 },
            { t: "🗣️ Desobediência", s: "Respondeu mal", v: -100 }
        ]
    };

    function render() {
        document.getElementById('nomeDisplay').innerText = dados.nome;
        document.getElementById('premioDisplay').innerText = dados.premio;
        document.getElementById('pontosDisplay').innerText = dados.pontos;
        document.getElementById('metaDisplay').innerText = dados.meta;
        
        let porc = (dados.pontos / dados.meta) * 100;
        document.getElementById('progressoBarra').style.width = Math.min(porc, 100) + "%";
        
        // Lógica do Avatar Evolutivo
        const avatar = document.getElementById('avatarProgresso');
        if (porc >= 100) avatar.innerText = "🍎";
        else if (porc >= 80) avatar.innerText = "🌳";
        else if (porc >= 50) avatar.innerText = "🌿";
        else if (porc >= 20) avatar.innerText = "🌱";
        else avatar.innerText = "🥚";

        const lista = document.getElementById('listaApp');
        lista.innerHTML = "";
        dados.tarefas.forEach(t => {
            lista.innerHTML += `
                <div class="tarefa-item" onclick="mudarPontos(${t.v})">
                    <div class="tarefa-info">
                        <span class="tarefa-titulo">${t.t}</span>
                        <span class="tarefa-sub">${t.s}</span>
                    </div>
                    <strong style="color: ${t.v >= 0 ? '#27ae60' : '#eb5757'}">${t.v >= 0 ? '+' : ''}${t.v}</strong>
                </div>`;
        });

        if (dados.pontos >= dados.meta) document.getElementById('modalVitoria').style.display = 'flex';
        localStorage.setItem('jornada_v3', JSON.stringify(dados));
    }

    function mudarPontos(v) {
        dados.pontos += v;
        if(dados.pontos < 0) dados.pontos = 0;
        
        if (v < 0) {
            document.getElementById('msgAviso').innerText = "Não desanime, eu confio em você! Foi apenas um deslize.";
            document.getElementById('avisoDeslize').style.display = 'block';
        }

        const emoji = v >= 0 ? "😊" : "😢";
        const div = document.createElement("div");
        div.className = "feedback-flutuante";
        div.innerText = emoji;
        div.style.left = "50%"; div.style.top = "50%";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1000);
        render();
    }

    function confirmarMelhora() {
        document.getElementById('avisoDeslize').style.display = 'none';
        let falta = dados.meta - dados.pontos;
        alert(`O seu ${dados.premio} está te esperando! Faltam apenas ${falta} pontos.`);
    }

    // Funções de Modal e Edição permanecem similares às anteriores...
    document.getElementById('abrirModal').addEventListener('click', () => {
        document.getElementById('painelConfig').style.display = 'flex';
        document.getElementById('editNome').value = dados.nome;
        document.getElementById('editPremio').value = dados.premio;
        document.getElementById('editMeta').value = dados.meta;
        renderListaEdit();
    });

    function renderListaEdit() {
        const div = document.getElementById('listaEdit');
        div.innerHTML = "";
        dados.tarefas.forEach((t, i) => {
            div.innerHTML += `
                <div style="background:#f9f9f9; padding:10px; margin-bottom:5px; border-radius:10px;">
                    <input type="text" value="${t.t}" onchange="dados.tarefas[${i}].t = this.value" placeholder="Título">
                    <input type="text" value="${t.s}" onchange="dados.tarefas[${i}].s = this.value" placeholder="Descrição">
                    <input type="number" value="${t.v}" onchange="dados.tarefas[${i}].v = parseInt(this.value)">
                    <button onclick="dados.tarefas.splice(${i},1); renderListaEdit()" style="color:red; border:none; background:none; font-size:10px; cursor:pointer;">Remover</button>
                </div>`;
        });
    }

    function novaTarefa() {
        dados.tarefas.push({ t: "Nova", s: "Descrição", v: 10 });
        renderListaEdit();
    }

    document.getElementById('btnSalvar').addEventListener('click', () => {
        dados.nome = document.getElementById('editNome').value;
        dados.premio = document.getElementById('editPremio').value;
        dados.meta = parseInt(document.getElementById('editMeta').value);
        document.getElementById('painelConfig').style.display = 'none';
        render();
    });

    document.getElementById('btnFechar').addEventListener('click', () => document.getElementById('painelConfig').style.display = 'none');

    function resetarTudo() {
        if (confirm("Resetar?")) { localStorage.removeItem('jornada_v3'); location.reload(); }
    }

    render();
</script>
</body>
</html>
